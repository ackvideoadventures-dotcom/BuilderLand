<!DOCTYPE html>
<html>
<head>
<title>BuilderLand</title>

<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  text-align: center;
  background: #111;
  color: white;
}

#home {
  padding: 60px;
}

button {
  padding: 10px 20px;
  margin: 10px;
  cursor: pointer;
}

#editorContainer {
  display: none;
}

#explorePage {
  display: none;
}

canvas {
  background: white;
  border: 2px solid black;
}
</style>
</head>

<body>

<div id="home">
  <h1>BuilderLand</h1>
  <button id="btnCreate">Create</button>
  <button id="btnExplore">Explore</button>
</div>

<div id="editorContainer">
  <button id="btnPublish">Publish</button>
  <canvas id="editor" width="800" height="500"></canvas>
</div>

<div id="explorePage"></div>

<script>
(function () {

const API_URL = window.location.origin;

 async function fetchGames() {
  try {
    const res = await fetch(API_URL + "/games");
    return await res.json();
  } catch (e) {
    console.error("Failed to load games:", e);
    return [];
  }
}

async function pushGame(game) {
  try {
    await fetch(API_URL + "/games", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(game)
    });
  } catch (e) {
    console.error("Failed to publish:", e);
    alert("Publish failed");
  }
}

 const canvas = document.getElementById("editor");
const ctx = canvas.getContext("2d");

let blocks = [];
let triangles = [];
let wins = [];
let spawnPoint = null;

let currentTool = "block";

// simple drawing tools
canvas.addEventListener("click", (e) => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  if (currentTool === "block") {
    blocks.push({ x, y, width: 50, height: 50 });
  }

  if (currentTool === "triangle") {
    triangles.push({ x, y, width: 50, height: 50 });
  }

  if (currentTool === "win") {
    wins.push({ x, y, width: 50, height: 50 });
  }

  if (currentTool === "spawn") {
    spawnPoint = { x, y, width: 40, height: 40 };
  }

  draw();
});

// draw everything
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.fillStyle = "gray";
  blocks.forEach(b => {
    ctx.fillRect(b.x, b.y, b.width, b.height);
  });

  ctx.fillStyle = "red";
  triangles.forEach(t => {
    ctx.beginPath();
    ctx.moveTo(t.x, t.y);
    ctx.lineTo(t.x + t.width, t.y);
    ctx.lineTo(t.x + t.width / 2, t.y - t.height);
    ctx.closePath();
    ctx.fill();
  });

  ctx.fillStyle = "yellow";
  wins.forEach(w => {
    ctx.fillRect(w.x, w.y, w.width, w.height);
  });

  if (spawnPoint) {
    ctx.fillStyle = "cyan";
    ctx.fillRect(spawnPoint.x, spawnPoint.y, spawnPoint.width, spawnPoint.height);
  }
}

 // ── Navigation ──
const home = document.getElementById("home");
const editorContainer = document.getElementById("editorContainer");
const explorePage = document.getElementById("explorePage");

document.getElementById("btnCreate").onclick = () => {
  home.style.display = "none";
  editorContainer.style.display = "block";
  explorePage.style.display = "none";
};

document.getElementById("btnExplore").onclick = async () => {
  home.style.display = "none";
  editorContainer.style.display = "none";
  explorePage.style.display = "block";

  const games = await fetchGames();

  explorePage.innerHTML = "<h2>Games</h2>";

  games.forEach(g => {
    const div = document.createElement("div");
    div.className = "gameCard";

    const btn = document.createElement("button");
    btn.textContent = "Play";

    btn.onclick = () => {
      blocks = g.blocks || [];
      triangles = g.triangles || [];
      wins = g.wins || [];
      spawnPoint = g.spawnPoint || null;

      home.style.display = "none";
      explorePage.style.display = "none";
      editorContainer.style.display = "block";

      draw();
    };

    div.appendChild(btn);
    explorePage.appendChild(div);
  });
};

// ── Tool buttons ──
document.getElementById("btnBlock").onclick = () => currentTool = "block";
document.getElementById("btnTriangle").onclick = () => currentTool = "triangle";
document.getElementById("btnSpawn").onclick = () => currentTool = "spawn";
document.getElementById("btnWin").onclick = () => currentTool = "win";

// ── Publish ──
document.getElementById("btnPublish").onclick = async () => {
  const game = {
    id: Date.now().toString(),
    blocks,
    triangles,
    wins,
    spawnPoint
  };

  await pushGame(game);
  alert("Published!");
};

 })();
</script>
</body>
</html>
