<!DOCTYPE html>
<html>
<head>
<title>BuilderLand</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@400;700;900&display=swap');

:root {
  --green: #4CAF50;
  --blue: #2196F3;
  --pink: #E91E63;
  --teal: #009688;
  --orange: #FF9800;
  --purple: #9C27B0;
  --dark-purple: #673AB7;
  --indigo: #3F51B5;
  --cyan: #00BCD4;
  --yellow: #FFC107;
  --gray: #607D8B;
  --brown: #795548;
  --red: #F44336;
 --bg: #d1fdff;
  --card: #16213e;
  --surface: #ffffff;
}

/* ── Account Page ── */
#accountPage { display: none; min-height: 100vh; padding: 40px 20px; background: var(--bg); position: relative; overflow: hidden; }
#accountPage .account-inner { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; gap: 20px; }
#accountPage h2 { font-family: 'Press Start 2P', monospace; font-size: 1.3em; color: #fff; text-shadow: 0 0 12px rgba(33,150,243,0.6); margin-bottom: 4px; }
.account-card { background: var(--card); border: 2px solid rgba(255,255,255,0.12); border-radius: 18px; padding: 28px 32px; max-width: 400px; width: 100%; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
.account-card label { display: block; color: #aac; font-size: 0.82em; font-weight: 700; margin-bottom: 5px; text-align: left; letter-spacing: 0.5px; }
.account-card input[type=text], .account-card input[type=password] { width: 100%; background: #0d1b36; border: 2px solid rgba(255,255,255,0.15); color: #eee; border-radius: 10px; padding: 10px 14px; font-size: 1em; font-family: 'Nunito', sans-serif; font-weight: 700; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
.account-card input[type=text]:focus, .account-card input[type=password]:focus { border-color: var(--blue); }
.acc-error { color: #f88; font-size: 0.85em; min-height: 1.2em; margin-bottom: 6px; text-align: left; }
.acc-success { color: #6f6; font-size: 0.85em; min-height: 1.2em; margin-bottom: 6px; text-align: left; }
#btnAccSubmit { width: 100%; background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0a2040; font-size: 1.1em; padding: 12px; border-radius: 12px; font-weight: 900; margin-top: 6px; }
#btnAccLogout { width: 100%; background: #555; color: #eee; font-size: 1em; padding: 10px; border-radius: 12px; font-weight: 700; margin-top: 8px; }
#btnAccBack { background: #444; color: #eee; margin-bottom: 10px; }
.color-slider-row { display: flex; flex-direction: column; gap: 8px; margin-top: 14px; }
.color-slider-row label { margin-bottom: 0; }
#playerColorSlider { -webkit-appearance: none; appearance: none; width: 100%; height: 14px; border-radius: 8px; outline: none; cursor: pointer; border: none; }
#playerColorSlider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 24px; height: 24px; border-radius: 50%; background: #fff; border: 3px solid #0a2040; cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
.color-preview-row { display: flex; align-items: center; gap: 12px; margin-top: 8px; }
#playerColorPreview { width: 40px; height: 40px; border-radius: 8px; border: 3px solid rgba(255,255,255,0.3); display: inline-block; flex-shrink: 0; }
.color-preview-label { color: #aac; font-size: 0.82em; font-weight: 700; }
#playerNameDisplay { position: absolute; bottom: 18px; left: 20px; z-index: 2; }
#playerNameBadge { background: rgba(22,33,62,0.85); border: 2px solid rgba(255,255,255,0.15); border-radius: 12px; padding: 8px 16px; color: #eee; font-weight: 900; font-size: 0.95em; display: none; align-items: center; gap: 8px; }
#playerNameBadge .badge-cube { width: 18px; height: 18px; border-radius: 4px; display: inline-block; flex-shrink: 0; }
#btnAccount { background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; }

* { box-sizing: border-box; }
body { font-family: 'Nunito', sans-serif; text-align: center; margin: 0; background: var(--bg); color: #eee; }

/* ── Home ── */
#home { padding: 60px 20px; display: flex; flex-direction: column; align-items: center; gap: 24px; min-height: 100vh; justify-content: center; position: relative; overflow: hidden; }
#homeCanvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
#home h1, #home p, #home .menu-buttons { position: relative; z-index: 1; }
#home h1 { font-family: 'Press Start 2P', monospace; font-size: 2.2em; margin: 0 0 6px 0; color: #fff; text-shadow: 0 0 20px rgba(33,150,243,0.8), 0 4px 0 #0d47a1; letter-spacing: 2px; }
#home p { color: #aac; font-size: 1.1em; margin: 0; }
#home .menu-buttons { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; margin-top: 10px; }
#home .menu-buttons button { font-family: 'Nunito', sans-serif; font-size: 1.2em; padding: 18px 44px; border-radius: 14px; border: none; cursor: pointer; font-weight: 900; transition: transform 0.12s, box-shadow 0.12s; letter-spacing: 0.5px; }
#home .menu-buttons button:hover { transform: scale(1.06) translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
#btnCreate  { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #0a3d2e; }
#btnExplore { background: linear-gradient(135deg, #4facfe, #00f2fe); color: #0a2040; }

/* ── Editor :) ── */
#editorContainer { display: none; height: 100vh; overflow-y: auto; background: var(--bg); }
#creatorPanel { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 14px 20px; }
#titleInput { background: var(--card); border: 2px solid var(--surface); color: #eee; border-radius: 8px; padding: 8px 14px; font-size: 1em; font-family: 'Nunito', sans-serif; font-weight: 700; outline: none; width: 260px; }
#titleInput:focus { border-color: var(--blue); }
#toolbar { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; }
button { padding: 8px 14px; cursor: pointer; border-radius: 8px; border: none; font-size: 0.9em; font-family: 'Nunito', sans-serif; font-weight: 700; transition: opacity 0.1s, transform 0.1s; }
button:hover:not(:disabled) { opacity: 0.88; transform: scale(1.04); }
button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
#editor { border: 3px solid var(--surface); border-radius: 8px; background: #fff; display: block; }

/* ── Explorer (broken) ── */
#explorePage { display: none; min-height: 100vh; padding: 30px 20px; background: var(--bg); }
#explorePage h2 { font-family: 'Press Start 2P', monospace; font-size: 1.3em; color: #fff; text-shadow: 0 0 12px rgba(33,150,243,0.6); margin-bottom: 20px; }
.gameCard { background: var(--card); border: 1px solid var(--surface); margin: 10px auto; padding: 16px 20px; max-width: 420px; border-radius: 14px; text-align: left; transition: transform 0.12s, box-shadow 0.12s; }
.gameCard:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.4); }
.gameCard h3 { margin: 0 0 6px 0; color: #fff; font-size: 1.1em; }
.gameCard small { color: #88a; font-size: 0.82em; }

/* ── Button collors Do NOT change lol── */
#btnSmall    { background: var(--purple); color: white; }
#btnNormal   { background: var(--dark-purple); color: white; }
#btnBig      { background: var(--indigo); color: white; }
#btnGravity  { background: var(--orange); color: white; }
#btnBlock    { background: var(--gray); color: white; }
#btnThin     { background: var(--brown); color: white; }
#btnTriangle { background: var(--red); color: white; }
#btnSpawn    { background: var(--cyan); color: #222; }
#btnWin      { background: var(--yellow); color: #333; }
#btnSave     { background: var(--green); color: white; }
#btnLoad     { background: var(--blue); color: white; }
#btnPublish  { background: var(--pink); color: white; }
#btnShareLink{ background: var(--teal); color: white; }
#btnBg       { background: #455A64; color: white; }
#btnRotate   { background: #5C6BC0; color: white; }
#btnHome     { background: #555; color: white; }
#btnBackExplore { background: #555; color: white; margin-bottom: 16px; }
#btnAsphalt  { background: #37474F; color: white; }
#btnIce      { background: #80DEEA; color: #003a40; }
#btnBounce   { background: #FF5722; color: white; }

.explore-back { background: #444; color: #eee; margin-bottom: 20px; }
.play-btn { background: linear-gradient(135deg, #43e97b, #38f9d7); color: #0a3d2e; font-weight: 900; margin-top: 10px; }
.selected-tool { outline: 3px solid #fff; outline-offset: 2px; }

#statusMsg { font-size: 0.88em; color: #aac; min-height: 1.2em; }

/* ── Mobile controls ── */
#mobileControls { display: flex; justify-content: space-between; align-items: center; width: 800px; max-width: 100%; padding: 8px 4px 0 4px; }
#mobileControls button { font-size: 1.6em; padding: 14px 28px; border-radius: 12px; background: #333; color: #fff; border: 2px solid #555; user-select: none; -webkit-user-select: none; touch-action: manipulation; }
#mobileControls button:active { background: #555; transform: scale(0.95); }
#muteBtn { position: fixed; bottom: 16px; right: 16px; z-index: 999; font-size: 1.3em; padding: 10px 14px; border-radius: 50%; background: #333; color: #fff; border: 2px solid #555; cursor: pointer; }
#canvasRow { display: flex; align-items: flex-start; gap: 10px; justify-content: center; }
#colorPicker { display: flex; flex-direction: column; align-items: center; gap: 6px; padding-top: 4px; }
#colorPicker label { color: #aac; font-size: 0.75em; font-weight: 700; writing-mode: vertical-rl; text-orientation: mixed; letter-spacing: 1px; }
#blockColor { width: 36px; height: 160px; border: none; border-radius: 8px; cursor: pointer; padding: 0; background: none; }
</style>
</head>
<body>

<div id="home">
  <canvas id="homeCanvas"></canvas>
  <h1>🏗️ BuilderLand</h1>
  <p>Build and share your own platformer levels! Made by C.H.</p>
  <div class="menu-buttons">
    <button id="btnCreate">🛠️ Create Game</button>
    <button id="btnExplore">🌍 Explore Games</button>
    <button id="btnAccount">👤 Account</button>
  </div>
  <div id="playerNameDisplay">
    <div id="playerNameBadge"><span class="badge-cube" id="badgeCube"></span><span id="badgeName"></span></div>
  </div>
</div>

<div id="accountPage">
  <div class="account-inner">
    <h2>👤 Account</h2>
    <button id="btnAccBack">🏠 Back to Home</button>
    <div class="account-card" id="accLoginCard">
      <div style="display:flex;gap:0;margin-bottom:18px;border-radius:10px;overflow:hidden;border:2px solid rgba(255,255,255,0.13);">
        <button id="btnModeSignup" style="flex:1;border-radius:0;margin:0;padding:10px 0;background:linear-gradient(135deg,#4facfe,#00f2fe);color:#0a2040;font-size:0.95em;font-weight:900;">✨ Sign Up</button>
        <button id="btnModeLogin"  style="flex:1;border-radius:0;margin:0;padding:10px 0;background:#1a2a4a;color:#88aacc;font-size:0.95em;font-weight:700;">🔑 Log In</button>
      </div>
      <div id="accMsg" class="acc-error"></div>
      <div>
        <label for="accUsername">USERNAME (3–20 characters)</label>
        <input type="text" id="accUsername" placeholder="Enter username" maxlength="20" autocomplete="username" />
      </div>
      <div>
        <label for="accPassword">PASSWORD</label>
        <input type="password" id="accPassword" placeholder="Enter password" autocomplete="current-password" />
      </div>
      <button id="btnAccSubmit">✨ Create Account</button>
    </div>
    <div class="account-card" id="accLoggedCard" style="display:none;">
      <div id="accWelcome" style="color:#eee;font-size:1.1em;font-weight:900;margin-bottom:16px;text-align:left;">Welcome back!</div>
      <div class="color-slider-row">
        <label for="playerColorSlider">🎨 PLAYER CUBE COLOR</label>
        <input type="range" id="playerColorSlider" min="0" max="360" value="120" />
        <div class="color-preview-row">
          <span id="playerColorPreview"></span>
          <span class="color-preview-label">Drag the slider to pick your cube color</span>
        </div>
      </div>
      <button id="btnAccLogout">🚪 Log Out</button>
    </div>
  </div>
</div>

<div id="editorContainer">
  <div id="creatorPanel">
    <input id="titleInput" placeholder="Game title" />
    <div id="toolbar">
      <button id="btnSmall">🔹 Small</button>
      <button id="btnNormal">🔷 Normal</button>
      <button id="btnBig">🟦 Big</button>
      <button id="btnGravity">🌍 Gravity: ON</button>
      <button id="btnBlock">⬛ Square</button>
      <button id="btnThin">➖ Thin</button>
      <button id="btnTriangle">🔺 Triangle</button>
      <button id="btnAsphalt">🛣️ Asphalt</button>
      <button id="btnIce">🧊 Ice</button>
      <button id="btnBounce">🟠 Bounce</button>
      <button id="btnSpawn">🏁 Spawn</button>
      <button id="btnWin">⭐ Win</button>
      <button id="btnSave">💾 Save</button>
      <button id="btnLoad">📂 Load</button>
      <button id="btnPublish">🚀 Publish</button>
      <button id="btnShareLink">🔗 Share Link</button>
      <button id="btnBg">🎨 Background</button>
      <button id="btnRotate">🔄 Rotate: 0°</button>
      <button id="btnHome">🏠 Home</button>
    </div>
    <div id="statusMsg"></div>
    <div id="playingBanner" style="display:none;align-items:center;gap:12px;padding:8px 0;">
      <button id="btnBackToExplore" style="background:#555;color:#eee;">🌍 Back to Explore</button>
      <span style="color:#aac;font-size:0.9em;" id="playingTitle"></span>
    </div>
    <div id="canvasRow">
      <div id="colorPicker">
        <label>COLOR</label>
        <input type="color" id="blockColor" value="#888888" title="Block color" />
      </div>
      <canvas id="editor" width="800" height="500"></canvas>
    </div>
    <div id="mobileControls">
      <button id="btnLeft">◀</button>
      <button id="btnJump">▲ Jump</button>
      <button id="btnRight">▶</button>
    </div>
    <p id="editorHint" style="color:#aac;font-size:0.85em;margin:4px 0 0 0;">Left Click to place &nbsp;·&nbsp; Right Click to Delete.</p>
  </div>
</div>

<div id="explorePage"></div>
<audio id="bgMusic" loop preload="auto">
  <source src="music.wav" type="audio/wav">
  <source src="./music.wav" type="audio/wav">
</audio>
<button id="muteBtn">🔊</button>

<script>
(function () {


var HARDCODED_GAMES = JSON.parse('')
  var OWNER_USERNAME = "HazyMan223";

  function fetchGames() {
    // Load locally-published (unpushed) levels for your own preview
    var local = [];
    try { var r = localStorage.getItem("bl_published"); if (r) local = JSON.parse(r); } catch(e) {}
    // Merge: hardcoded (live for everyone) + local (only you can see until pushed)
    var all = HARDCODED_GAMES.slice().concat(local);
    // Deduplicate by id
    var seen = {}, deduped = [];
    for (var i = all.length - 1; i >= 0; i--) {
      if (!seen[all[i].id]) { seen[all[i].id] = true; deduped.unshift(all[i]); }
    }
    deduped.sort(function(a,b){ return (b.publishedAt||0)-(a.publishedAt||0); });
    return Promise.resolve(deduped);
  }

  // ── Game state ─────────────────────────────────────────────────────────────
  var canvas = document.getElementById("editor");
  var ctx = canvas.getContext("2d");
  var home = document.getElementById("home");
  var editorContainer = document.getElementById("editorContainer");
  var explorePage = document.getElementById("explorePage");
  var accountPage = document.getElementById("accountPage");
  var statusMsg = document.getElementById("statusMsg");

  // ── Account System ────────────────────────────────────────────────────────
  var BANNED_WORDS = ["fuck","shit","ass","bitch","cunt","dick","cock","pussy","bastard","damn","hell","piss","slut","whore","nigger","nigga","faggot","fag","retard","spic","chink","kike","gook","wetback","cracker","tranny","rape","pedo","nazi","kkk","hitler","sex","porn","nude","naked"];

  function containsBannedWord(str) {
    var lower = str.toLowerCase().replace(/[^a-z0-9]/g, "");
    for (var i = 0; i < BANNED_WORDS.length; i++) {
      if (lower.indexOf(BANNED_WORDS[i]) !== -1) return true;
    }
    return false;
  }

  // ── Multi-account registry ──────────────────────────────────────────
  var accMode = "signup";

  function getAllAccounts() {
    try { return JSON.parse(localStorage.getItem("bl_accounts")) || {}; } catch(e) { return {}; }
  }
  function saveAllAccounts(reg) {
    localStorage.setItem("bl_accounts", JSON.stringify(reg));
  }
  function getAccount() {
    try { return JSON.parse(localStorage.getItem("bl_account")) || null; } catch(e) { return null; }
  }
  function saveAccount(data) {
    localStorage.setItem("bl_account", JSON.stringify(data));
    var reg = getAllAccounts();
    reg[data.username.toLowerCase()] = { username: data.username, password: data.password, colorHue: data.colorHue };
    saveAllAccounts(reg);
  }

  function setAccMode(mode) {
    accMode = mode;
    var su = document.getElementById("btnModeSignup");
    var li = document.getElementById("btnModeLogin");
    var submit = document.getElementById("btnAccSubmit");
    document.getElementById("accMsg").textContent = "";
    if (mode === "signup") {
      su.style.background = "linear-gradient(135deg,#4facfe,#00f2fe)"; su.style.color = "#0a2040";
      li.style.background = "#1a2a4a"; li.style.color = "#88aacc";
      submit.textContent = "✨ Create Account";
    } else {
      li.style.background = "linear-gradient(135deg,#4facfe,#00f2fe)"; li.style.color = "#0a2040";
      su.style.background = "#1a2a4a"; su.style.color = "#88aacc";
      submit.textContent = "🔑 Log In";
    }
  }

  document.getElementById("btnModeSignup").addEventListener("click", function(){ setAccMode("signup"); });
  document.getElementById("btnModeLogin").addEventListener("click", function(){ setAccMode("login"); });

  // hue (0-360) → hex color
  function hueToHex(h) {
    var r,g,b;
    var s=1,l=0.55;
    var c=(1-Math.abs(2*l-1))*s;
    var x=c*(1-Math.abs((h/60)%2-1));
    var m=l-c/2;
    if(h<60){r=c;g=x;b=0;}else if(h<120){r=x;g=c;b=0;}else if(h<180){r=0;g=c;b=x;}else if(h<240){r=0;g=x;b=c;}else if(h<300){r=x;g=0;b=c;}else{r=c;g=0;b=x;}
    var toHex=function(n){var v=Math.round((n+m)*255).toString(16);return v.length===1?"0"+v:v;};
    return "#"+toHex(r)+toHex(g)+toHex(b);
  }

  function getPlayerColor() {
    var acc = getAccount();
    if (acc && acc.colorHue !== undefined) return hueToHex(acc.colorHue);
    return "#4CAF50";
  }

  function updateNameBadge() {
    var acc = getAccount();
    var badge = document.getElementById("playerNameBadge");
    var cube = document.getElementById("badgeCube");
    var nameEl = document.getElementById("badgeName");
    if (acc && acc.username) {
      badge.style.display = "flex";
      cube.style.background = getPlayerColor();
      nameEl.textContent = acc.username;
    } else {
      badge.style.display = "none";
    }
  }

  function openAccount() {
    home.style.display = "none";
    editorContainer.style.display = "none";
    explorePage.style.display = "none";
    accountPage.style.display = "block";
    loopRunning = false;
    renderAccountPage();
  }

  function renderAccountPage() {
    var acc = getAccount();
    var loginCard = document.getElementById("accLoginCard");
    var loggedCard = document.getElementById("accLoggedCard");
    if (acc && acc.username) {
      loginCard.style.display = "none";
      loggedCard.style.display = "block";
      document.getElementById("accWelcome").textContent = "Welcome, " + acc.username + "! 👋";
      var slider = document.getElementById("playerColorSlider");
      slider.value = acc.colorHue !== undefined ? acc.colorHue : 120;
      updateColorPreview(slider.value);
    } else {
      loginCard.style.display = "block";
      loggedCard.style.display = "none";
      document.getElementById("accMsg").textContent = "";
    }
  }

  function updateColorPreview(hue) {
    var color = hueToHex(parseInt(hue));
    document.getElementById("playerColorPreview").style.background = color;
    // build gradient for slider track
    var grad = "linear-gradient(to right,";
    for(var i=0;i<=12;i++){grad+=hueToHex(i*30)+(i<12?",":"");}
    grad+=")";
    document.getElementById("playerColorSlider").style.background = grad;
  }

  document.getElementById("playerColorSlider").addEventListener("input", function() {
    updateColorPreview(this.value);
    var acc = getAccount();
    if (acc) { acc.colorHue = parseInt(this.value); saveAccount(acc); updateNameBadge(); }
  });

  document.getElementById("btnAccSubmit").addEventListener("click", function() {
    var username = document.getElementById("accUsername").value.trim();
    var password = document.getElementById("accPassword").value;
    var msg = document.getElementById("accMsg");
    msg.className = "acc-error";

    if (username.length < 3) { msg.textContent = "Username must be at least 3 characters."; return; }
    if (username.length > 20) { msg.textContent = "Username must be 20 characters or less."; return; }
    if (!/^[a-zA-Z0-9_\- ]+$/.test(username)) { msg.textContent = "Username can only have letters, numbers, spaces, _ or -."; return; }
    if (containsBannedWord(username)) { msg.textContent = "That username is not allowed. Please choose another."; return; }
    if (password.length < 1) { msg.textContent = "Please enter a password."; return; }

    var reg = getAllAccounts();
    var key = username.toLowerCase();

    if (accMode === "signup") {
      if (reg[key]) { msg.textContent = "That username is already taken. Try logging in instead!"; return; }
      saveAccount({ username: username, password: password, colorHue: 120 });
      msg.className = "acc-success"; msg.textContent = "Account created! Welcome, " + username + "!";
    } else {
      if (!reg[key]) { msg.textContent = "No account found with that username. Sign up first!"; return; }
      if (reg[key].password !== password) { msg.textContent = "Wrong password. Try again!"; return; }
      saveAccount({ username: reg[key].username, password: reg[key].password, colorHue: reg[key].colorHue !== undefined ? reg[key].colorHue : 120 });
      msg.className = "acc-success"; msg.textContent = "Logged in! Welcome back, " + reg[key].username + "!";
    }
    setTimeout(function() { renderAccountPage(); updateNameBadge(); }, 800);
  });

  document.getElementById("btnAccLogout").addEventListener("click", function() {
    localStorage.removeItem("bl_account");
    renderAccountPage();
    updateNameBadge();
  });

  document.getElementById("btnAccBack").addEventListener("click", function() {
    accountPage.style.display = "none";
    home.style.display = "flex";
    playMusic();
    updateNameBadge();
  });

  document.getElementById("btnAccount").addEventListener("click", openAccount);

  // Initialize badge on load
  updateNameBadge();

  var selectedTool = "block", selectedSize = "normal";
  var blockColor = "#888888";

      spawnPoint=data.spawnPoint||null;
      if(spawnPoint){player.spawnX=spawnPoint.x;player.spawnY=spawnPoint.y;player.x=player.spawnX;player.y=player.spawnY;}
      document.getElementById("titleInput").value=data.title||"";
      startEditor();
    }catch(e){console.error("Invalid game link",e);}
  })();

  function openExplore(){
    home.style.display="none"; editorContainer.style.display="none"; explorePage.style.display="block"; loopRunning=false;
    playMusic();
    renderExplore();
  }

  function renderExplore(){
    explorePage.innerHTML='<h2>🌍 Published Games</h2><p style="color:#aac">Loading games from server...</p>';
    fetchGames().then(function(games){
      explorePage.innerHTML='<h2>🌍 Published Games</h2>';
      var backBtn=document.createElement("button");
      backBtn.textContent="🏠 Back to Home"; backBtn.className="explore-back"; backBtn.onclick=goHome;
      explorePage.appendChild(backBtn);

      if(games.length===0){
        var p=document.createElement("p");
        p.style.color="#aac";
        p.textContent="No games published yet — be the first!";
        explorePage.appendChild(p);
        return;
      }
      var isOwner=(function(){var a=getAccount();return a&&a.username===OWNER_USERNAME;})();
      games.forEach(function(g){
        var card=document.createElement("div"); card.className="gameCard";
        var date=g.publishedAt?new Date(g.publishedAt).toLocaleString():"";
        card.innerHTML='<h3>'+escapeHtml(g.title)+'</h3>'+(date?'<small>📅 '+date+'</small>':'')+'';
        var playBtn=document.createElement("button");
        playBtn.textContent="▶️ Play"; playBtn.className="play-btn";
        playBtn.onclick=(function(game){return function(){document.getElementById("playingTitle").textContent=game.title;playGame(game);};})(g);
        card.appendChild(playBtn);
        if(isOwner){
          var delBtn=document.createElement("button");
          delBtn.textContent="🗑️ Delete";
          delBtn.style.cssText="background:#c62828;color:#fff;margin-left:8px;font-weight:900;margin-top:8px;";
          delBtn.onclick=(function(game,cardEl){
            return function(){
              if(!confirm("Permanently delete \""+game.title+"\" from Explore for everyone?"))return;
              var deleted=[];
              try{deleted=JSON.parse(localStorage.getItem("bl_deleted")||"[]");}catch(e){}
              if(deleted.indexOf(game.id)===-1){deleted.push(game.id);}
              localStorage.setItem("bl_deleted",JSON.stringify(deleted));
              var pub=[];
              try{pub=JSON.parse(localStorage.getItem("bl_published")||"[]");}catch(e){}
              pub=pub.filter(function(x){return x.id!==game.id;});
              localStorage.setItem("bl_published",JSON.stringify(pub));
              cardEl.remove();
              alert("🗑️ Deleted locally! Also remove it from HARDCODED_GAMES in the HTML and push to GitHub to remove it for everyone.");
            };
          })(g,card);
          card.appendChild(delBtn);
        }
        explorePage.appendChild(card);
      });
        }).catch(function(e){
      explorePage.innerHTML='<h2>🌍 Published Games</h2><p style="color:#f88">Error loading games: '+escapeHtml(e.message)+'</p>';
      var backBtn=document.createElement("button"); backBtn.textContent="🏠 Back"; backBtn.className="explore-back"; backBtn.onclick=goHome; explorePage.appendChild(backBtn);
    });
  }

  function playGame(g){
    blocks.length=0;triangles.length=0;wins.length=0;asphalts.length=0;ices.length=0;bounces.length=0;
    blocks.push.apply(blocks,JSON.parse(JSON.stringify(g.blocks)));
    triangles.push.apply(triangles,JSON.parse(JSON.stringify(g.triangles)));
    wins.push.apply(wins,JSON.parse(JSON.stringify(g.wins)));
    if(g.asphalts)asphalts.push.apply(asphalts,JSON.parse(JSON.stringify(g.asphalts)));
    if(g.ices)ices.push.apply(ices,JSON.parse(JSON.stringify(g.ices)));
    if(g.bounces)bounces.push.apply(bounces,JSON.parse(JSON.stringify(g.bounces)));
    if(g.bgColor)bgColor=g.bgColor;
    spawnPoint=g.spawnPoint||null;
    if(spawnPoint){player.spawnX=spawnPoint.x;player.spawnY=spawnPoint.y;player.x=player.spawnX;player.y=player.spawnY;}
    // Hide editor UI, only show movement controls + back button
    document.getElementById("toolbar").style.display="none";
    document.getElementById("titleInput").style.display="none";
    document.getElementById("editorHint").style.display="none";
    document.getElementById("colorPicker").style.display="none";
    document.getElementById("playingBanner").style.display="flex";
    hasWon=false; explorePage.style.display="none"; editorContainer.style.display="block"; loopRunning=false; cameraX=0; startLoop();
  }

  function escapeHtml(str){
    return String(str).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
  }

  // ── Home screen animation ──────────────────────────────────────────────────
  (function(){
    var hc = document.getElementById("homeCanvas");
    var hx = hc.getContext("2d");
    var hShapes = [];
    var hGravity = 0.4;
    var COLORS = ["#9C27B0","#2196F3","#F44336","#4CAF50","#FF9800","#00BCD4","#E91E63","#FFC107"];

    function resizeHomeCanvas(){
      hc.width = hc.offsetWidth;
      hc.height = hc.offsetHeight;
    }
    resizeHomeCanvas();
    window.addEventListener("resize", resizeHomeCanvas);

    function spawnShape(){
      if(hShapes.length > 40){ hShapes.splice(0, 5); }
      var size = 20 + Math.random()*30;
      var type = ["square","circle","triangle"][Math.floor(Math.random()*3)];
      var color = COLORS[Math.floor(Math.random()*COLORS.length)];
      hShapes.push({
        x: Math.random()*(hc.width - size),
        y: -size,
        size: size,
        type: type,
        color: color,
        vy: 0.5 + Math.random()*1.5,
        vx: (Math.random()-0.5)*2
      });
    }

    function updateHomeShapes(){
      for(var i=0;i<hShapes.length;i++){
        var s=hShapes[i];
        s.vy+=hGravity;
        s.y+=s.vy;
        s.x+=s.vx;
        if(s.y+s.size>hc.height){s.y=hc.height-s.size;s.vy*=-0.45;if(Math.abs(s.vy)<0.5)s.vy=0;}
        if(s.x<0){s.x=0;s.vx*=-0.6;}
        if(s.x+s.size>hc.width){s.x=hc.width-s.size;s.vx*=-0.6;}
        for(var j=0;j<hShapes.length;j++){
          if(i===j)continue;
          var o=hShapes[j];
          if(s.x<o.x+o.size&&s.x+s.size>o.x&&s.y<o.y+o.size&&s.y+s.size>o.y){
            if(s.vy>0&&s.y+s.size-s.vy<=o.y+1){s.y=o.y-s.size;s.vy*=-0.4;if(Math.abs(s.vy)<0.5)s.vy=0;}
          }
        }
      }
    }

    function drawHomeShapes(){
      hx.clearRect(0,0,hc.width,hc.height);
      for(var i=0;i<hShapes.length;i++){
        var s=hShapes[i];
        hx.fillStyle=s.color;
        hx.globalAlpha=0.55;
        if(s.type==="square"){
          hx.fillRect(s.x,s.y,s.size,s.size);
        } else if(s.type==="circle"){
          hx.beginPath();hx.arc(s.x+s.size/2,s.y+s.size/2,s.size/2,0,Math.PI*2);hx.fill();
        } else {
          hx.beginPath();hx.moveTo(s.x+s.size/2,s.y);hx.lineTo(s.x,s.y+s.size);hx.lineTo(s.x+s.size,s.y+s.size);hx.closePath();hx.fill();
        }
        hx.globalAlpha=1;
      }
    }

    function homeLoop(){ drawHomeShapes(); updateHomeShapes(); requestAnimationFrame(homeLoop); }
    homeLoop();
    spawnShape();
    setInterval(spawnShape, 5000);
  })();

})();
</script>
</body>
</html>
