<!DOCTYPE html>
<html>
<head>
<title>BuilderLand</title>
<style>
body { font-family: Arial; text-align: center; margin: 0; }
#home { padding: 60px 20px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
#home h1 { font-size: 3em; margin: 0 0 10px 0; }
#home .menu-buttons { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
#home .menu-buttons button { font-size: 1.3em; padding: 18px 40px; border-radius: 12px; border: none; cursor: pointer; font-weight: bold; transition: transform 0.1s, opacity 0.1s; }
#home .menu-buttons button:hover { transform: scale(1.05); opacity: 0.92; }
#btnCreate  { background: #4CAF50; color: white; }
#btnExplore { background: #2196F3; color: white; }
#editorContainer { display: none; height: 100vh; overflow-y: auto; }
#creatorPanel { display: flex; flex-direction: column; align-items: center; gap: 10px; padding: 20px; }
#toolbar { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
button { padding: 8px 12px; cursor: pointer; border-radius: 6px; border: 1px solid rgba(0,0,0,0.2); font-size: 0.95em; }
button:disabled { opacity: 0.5; cursor: not-allowed; }
#editor { border: 2px solid black; }
.selected { background: #4CAF50; color: white; }
#explorePage { display: none; height: 100vh; overflow-y: auto; padding: 20px; }
.gameCard { border: 1px solid black; margin: 10px auto; padding: 10px; max-width: 400px; border-radius: 8px; }
#setupBanner { background: #fff3cd; border: 1px solid #ffc107; padding: 14px; margin: 10px auto; max-width: 600px; border-radius: 8px; font-size: 0.95em; display: none; }
/* Toolbar button colors */
#btnSmall    { background: #9C27B0; color: white; }
#btnNormal   { background: #673AB7; color: white; }
#btnBig      { background: #3F51B5; color: white; }
#btnGravity  { background: #FF9800; color: white; }
#btnBlock    { background: #607D8B; color: white; }
#btnThin     { background: #795548; color: white; }
#btnTriangle { background: #F44336; color: white; }
#btnSpawn    { background: #00BCD4; color: white; }
#btnWin      { background: #FFC107; color: #333; }
#btnSave     { background: #4CAF50; color: white; }
#btnLoad     { background: #2196F3; color: white; }
#btnPublish  { background: #E91E63; color: white; }
#btnShareLink{ background: #009688; color: white; }
#btnHome     { background: #9E9E9E; color: white; }
</style>
</head>
<body>

<div id="home">
  <h1>🏗️ BuilderLand</h1>
  <p style="font-size:1.1em;color:#555;margin:0">Build and share your own platformer levels!</p>
  <div id="setupBanner">
    ⚙️ <strong>One-time setup needed for Explore/Publish:</strong>
    Go to <a href="https://jsonbin.io" target="_blank">jsonbin.io</a>, sign up free,
    create an API key, then create a new Bin with contents <code>{"games":[]}</code>.
    Paste your <strong>API Key</strong> and <strong>Bin ID</strong> into the two boxes below and click Save.
    <br><br>
    <input id="setupKey" placeholder="API Key  ($2a$10$...)" style="width:340px;padding:6px;" />
    <input id="setupBin" placeholder="Bin ID  (686...)" style="width:200px;padding:6px;margin-left:6px;" />
    <button onclick="saveSetup()" style="margin-left:6px;">💾 Save</button>
  </div>
  <div class="menu-buttons">
    <button id="btnCreate">🛠️ Create Game</button>
    <button id="btnExplore">🌍 Explore Games</button>
  </div>
</div>

<div id="editorContainer">
  <div id="creatorPanel">
    <input id="titleInput" placeholder="Game title" />
    <div id="toolbar">
      <button id="btnSmall">🔹 Small</button>
      <button id="btnNormal">🔷 Normal</button>
      <button id="btnBig">🟦 Big</button>
      <button id="btnGravity">🌍 Gravity: ON</button>
      <button id="btnBlock">⬛ Square</button>
      <button id="btnThin">➖ Thin</button>
      <button id="btnTriangle">🔺 Triangle</button>
      <button id="btnSpawn">🏁 Spawn</button>
      <button id="btnWin">⭐ Win</button>
      <button id="btnSave">💾 Save</button>
      <button id="btnLoad">📂 Load</button>
      <button id="btnPublish">🚀 Publish</button>
      <button id="btnShareLink">🔗 Share Link</button>
      <button id="btnHome">🏠 Home</button>
    </div>
    <canvas id="editor" width="800" height="500"></canvas>
  </div>
</div>

<div id="explorePage"></div>

<script>
(function () {

  // ── Storage config (saved in localStorage so it survives page reloads) ────
  function getConfig() {
    try { return JSON.parse(localStorage.getItem("blConfig") || "{}"); } catch(e) { return {}; }
  }
  function binURL() {
    var c = getConfig();
    return c.binId ? "https://api.jsonbin.io/v3/b/" + c.binId : null;
  }
  function apiKey() { return getConfig().apiKey || null; }
  function isConfigured() { var c = getConfig(); return !!(c.binId && c.apiKey); }

  window.saveSetup = function() {
    var key = document.getElementById("setupKey").value.trim();
    var bin = document.getElementById("setupBin").value.trim();
    if (!key || !bin) { alert("Please fill in both fields."); return; }
    localStorage.setItem("blConfig", JSON.stringify({ apiKey: key, binId: bin }));
    document.getElementById("setupBanner").style.display = "none";
    alert("✅ Saved! Publish and Explore will now work.");
  };

  function showSetupBanner() {
    document.getElementById("setupBanner").style.display = "block";
    var c = getConfig();
    if (c.apiKey) document.getElementById("setupKey").value = c.apiKey;
    if (c.binId)  document.getElementById("setupBin").value  = c.binId;
  }

  if (!isConfigured()) showSetupBanner();

  // ── JSONBin fetch/push ────────────────────────────────────────────────────
  function fetchGames() {
    if (!isConfigured()) return Promise.reject(new Error("Not configured — see setup banner on the home screen."));
    return fetch(binURL() + "/latest", {
      headers: { "X-Master-Key": apiKey() }
    })
      .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function(res) {
        var games = (res.record && res.record.games) ? res.record.games : [];
        return games.slice().sort(function(a,b){ return b.publishedAt - a.publishedAt; }).slice(0,50);
      });
  }

  function pushGame(game) {
    if (!isConfigured()) return Promise.reject(new Error("Not configured — see setup banner on the home screen."));
    return fetch(binURL() + "/latest", {
      headers: { "X-Master-Key": apiKey() }
    })
      .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(function(res) {
        var games = (res.record && res.record.games) ? res.record.games : [];
        games.push(game);
        if (games.length > 100) games = games.slice(games.length - 100);
        return fetch(binURL(), {
          method: "PUT",
          headers: { "Content-Type": "application/json", "X-Master-Key": apiKey() },
          body: JSON.stringify({ games: games })
        });
      })
      .then(function(r) { if (!r.ok) throw new Error("HTTP " + r.status); });
  }

  // ── Game state ────────────────────────────────────────────────────────────
  var canvas = document.getElementById("editor");
  var ctx = canvas.getContext("2d");
  var home = document.getElementById("home");
  var editorContainer = document.getElementById("editorContainer");
  var explorePage = document.getElementById("explorePage");

  var selectedTool = "block", selectedSize = "normal";
  var gravityOnNewBlocks = true, loopRunning = false, hasWon = false;
  var gravity = 0.5;
  var player = { x:380, y:200, spawnX:380, spawnY:200, width:40, height:40, vx:0, vy:0, onGround:false };
  var blocks = [], triangles = [], wins = [];
  var spawnPoint = null;

  function getSize() { return selectedSize==="small"?25:selectedSize==="big"?80:50; }

  var PUBLISH_COOLDOWN_MS = 60000;
  function getCooldownRemaining() {
    return Math.max(0, PUBLISH_COOLDOWN_MS - (Date.now() - parseInt(localStorage.getItem("lastPublishTime")||"0",10)));
  }
  function startCooldownUI() {
    var btn = document.getElementById("btnPublish");
    function tick() {
      var rem = getCooldownRemaining();
      if (rem<=0) { btn.disabled=false; btn.textContent="🚀 Publish"; }
      else { btn.disabled=true; btn.textContent="🚀 Publish ("+Math.ceil(rem/1000)+"s)"; setTimeout(tick,500); }
    }
    tick();
  }

  // ── Button wiring ─────────────────────────────────────────────────────────
  document.getElementById("btnCreate").addEventListener("click", startEditor);
  document.getElementById("btnExplore").addEventListener("click", openExplore);
  document.getElementById("btnHome").addEventListener("click", goHome);
  document.getElementById("btnSmall").addEventListener("click", function(){ selectedSize="small"; });
  document.getElementById("btnNormal").addEventListener("click", function(){ selectedSize="normal"; });
  document.getElementById("btnBig").addEventListener("click", function(){ selectedSize="big"; });
  document.getElementById("btnGravity").addEventListener("click", function(){
    gravityOnNewBlocks=!gravityOnNewBlocks;
    this.textContent="🌍 Gravity: "+(gravityOnNewBlocks?"ON":"OFF");
  });
  document.getElementById("btnBlock").addEventListener("click", function(){ selectedTool="block"; });
  document.getElementById("btnThin").addEventListener("click", function(){ selectedTool="thin"; });
  document.getElementById("btnTriangle").addEventListener("click", function(){ selectedTool="triangle"; });
  document.getElementById("btnSpawn").addEventListener("click", function(){ selectedTool="spawn"; });
  document.getElementById("btnWin").addEventListener("click", function(){ selectedTool="win"; });
  document.getElementById("btnSave").addEventListener("click", saveGame);
  document.getElementById("btnLoad").addEventListener("click", loadGame);
  document.getElementById("btnPublish").addEventListener("click", publishGame);
  document.getElementById("btnShareLink").addEventListener("click", shareLink);

  startCooldownUI();

  // ── Canvas interaction ────────────────────────────────────────────────────
  canvas.addEventListener("contextmenu", function(e){ e.preventDefault(); });
  canvas.addEventListener("mousedown", function(e){
    var rect=canvas.getBoundingClientRect(), x=e.clientX-rect.left, y=e.clientY-rect.top, size=getSize();
    if(e.button===0){
      if(selectedTool==="block")    blocks.push({x:x-size/2,y:y-size/2,width:size,height:size,vy:gravityOnNewBlocks?.5:0,gravity:gravityOnNewBlocks});
      if(selectedTool==="thin")     blocks.push({x:x-size/2,y:y-size/8,width:size,height:size/4,vy:gravityOnNewBlocks?.5:0,gravity:gravityOnNewBlocks});
      if(selectedTool==="triangle") triangles.push({x:x-size/2,y:y-size/2,width:size,height:size,vy:.5});
      if(selectedTool==="win")      wins.push({x:x-size/2,y:y-size/2,width:size,height:size});
      if(selectedTool==="spawn"){
        spawnPoint={x:x-20,y:y-20,width:40,height:40};
        player.spawnX=spawnPoint.x; player.spawnY=spawnPoint.y;
        player.x=player.spawnX; player.y=player.spawnY; player.vx=0; player.vy=0;
      }
    }
    if(e.button===2){
      if(spawnPoint&&x>spawnPoint.x&&x<spawnPoint.x+spawnPoint.width&&y>spawnPoint.y&&y<spawnPoint.y+spawnPoint.height){spawnPoint=null;return;}
      for(var i=blocks.length-1;i>=0;i--){var b=blocks[i];if(x>b.x&&x<b.x+b.width&&y>b.y&&y<b.y+b.height){blocks.splice(i,1);return;}}
      for(var i=triangles.length-1;i>=0;i--){var t=triangles[i];if(x>t.x&&x<t.x+t.width&&y>t.y&&y<t.y+t.height){triangles.splice(i,1);return;}}
      for(var i=wins.length-1;i>=0;i--){var w=wins[i];if(x>w.x&&x<w.x+w.width&&y>w.y&&y<w.y+w.height){wins.splice(i,1);return;}}
    }
  });

  // ── Navigation ────────────────────────────────────────────────────────────
  function goHome(){ home.style.display="block"; editorContainer.style.display="none"; explorePage.style.display="none"; if(!isConfigured())showSetupBanner(); }
  function startEditor(){ home.style.display="none"; editorContainer.style.display="block"; explorePage.style.display="none"; startLoop(); }
  function startLoop(){ if(loopRunning)return; loopRunning=true; gameLoop(); }
  function gameLoop(){ update(); draw(); if(loopRunning) requestAnimationFrame(gameLoop); }

  var keys={};
  document.addEventListener("keydown",function(e){keys[e.key.toLowerCase()]=true;});
  document.addEventListener("keyup",function(e){keys[e.key.toLowerCase()]=false;});

  // ── Physics ───────────────────────────────────────────────────────────────
  function update(){
    if(keys["a"])player.vx=-4;else if(keys["d"])player.vx=4;else player.vx=0;
    if(keys[" "]&&player.onGround)player.vy=-10;
    player.vy+=gravity;player.x+=player.vx;player.y+=player.vy;player.onGround=false;
    if(player.y+player.height>canvas.height-10){player.y=canvas.height-10-player.height;player.vy=0;player.onGround=true;}
    for(var i=0;i<blocks.length;i++){var block=blocks[i];if(block.gravity){block.vy+=gravity;block.y+=block.vy;if(block.y+block.height>canvas.height-10){block.y=canvas.height-10-block.height;block.vy=0;}for(var j=0;j<blocks.length;j++){var other=blocks[j];if(block===other)continue;if(block.x<other.x+other.width&&block.x+block.width>other.x&&block.y<other.y+other.height&&block.y+block.height>other.y){if(block.vy>0){block.y=other.y-block.height;block.vy=0;}}}}}
    for(var i=0;i<triangles.length;i++){var t=triangles[i];t.vy+=gravity;t.y+=t.vy;if(t.y+t.height>canvas.height-10){t.y=canvas.height-10-t.height;t.vy=0;}for(var j=0;j<blocks.length;j++){var b=blocks[j];if(t.x<b.x+b.width&&t.x+t.width>b.x&&t.y<b.y+b.height&&t.y+t.height>b.y){if(t.vy>0){t.y=b.y-t.height;t.vy=0;}}}}
    for(var i=0;i<blocks.length;i++){var b=blocks[i];if(player.x<b.x+b.width&&player.x+player.width>b.x&&player.y<b.y+b.height&&player.y+player.height>b.y){if(player.vy>0){player.y=b.y-player.height;player.vy=0;player.onGround=true;}}}
    for(var i=0;i<triangles.length;i++){var t=triangles[i];if(player.x<t.x+t.width&&player.x+player.width>t.x&&player.y<t.y+t.height&&player.y+player.height>t.y){player.x=player.spawnX;player.y=player.spawnY;player.vx=0;player.vy=0;hasWon=false;}}
    for(var i=0;i<wins.length;i++){var w=wins[i];if(!hasWon&&player.x<w.x+w.width&&player.x+player.width>w.x&&player.y<w.y+w.height&&player.y+player.height>w.y){hasWon=true;alert("YOU WIN!");}}
  }

  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="black";ctx.fillRect(0,canvas.height-10,canvas.width,10);
    ctx.fillStyle="gray";for(var i=0;i<blocks.length;i++){var b=blocks[i];ctx.fillRect(b.x,b.y,b.width,b.height);}
    ctx.fillStyle="red";for(var i=0;i<triangles.length;i++){var t=triangles[i];ctx.beginPath();ctx.moveTo(t.x+t.width/2,t.y);ctx.lineTo(t.x,t.y+t.height);ctx.lineTo(t.x+t.width,t.y+t.height);ctx.closePath();ctx.fill();}
    ctx.fillStyle="gold";for(var i=0;i<wins.length;i++){var w=wins[i];ctx.fillRect(w.x,w.y,w.width,w.height);}
    if(spawnPoint){ctx.fillStyle="cyan";ctx.fillRect(spawnPoint.x,spawnPoint.y,spawnPoint.width,spawnPoint.height);ctx.fillStyle="black";ctx.font="bold 11px Arial";ctx.textAlign="center";ctx.fillText("SPAWN",spawnPoint.x+spawnPoint.width/2,spawnPoint.y+14);ctx.fillText("HERE",spawnPoint.x+spawnPoint.width/2,spawnPoint.y+28);ctx.textAlign="left";}
    ctx.fillStyle="green";ctx.fillRect(player.x,player.y,player.width,player.height);
  }

  // ── Save / Load / Publish / Share ─────────────────────────────────────────
  function saveGame(){
    var title=document.getElementById("titleInput").value||"Untitled Game";
    localStorage.setItem("savedGame",JSON.stringify({title:title,blocks:blocks,triangles:triangles,wins:wins,spawnPoint:spawnPoint}));
    alert("Game Saved!");
  }

  function loadGame(){
    var data=JSON.parse(localStorage.getItem("savedGame"));
    if(!data){alert("No saved game found!");return;}
    blocks.length=0;triangles.length=0;wins.length=0;
    blocks.push.apply(blocks,data.blocks);triangles.push.apply(triangles,data.triangles);wins.push.apply(wins,data.wins);
    spawnPoint=data.spawnPoint||null;
    if(spawnPoint){player.spawnX=spawnPoint.x;player.spawnY=spawnPoint.y;player.x=player.spawnX;player.y=player.spawnY;}
    document.getElementById("titleInput").value=data.title;
    alert("Game Loaded!");
  }

  function publishGame(){
    if(!isConfigured()){
      alert("Publishing requires a JSONBin setup.\n\nGo back to the home screen — you'll see a yellow setup banner with instructions.");
      return;
    }
    var rem=getCooldownRemaining();
    if(rem>0){alert("Please wait "+Math.ceil(rem/1000)+"s before publishing again.");return;}
    var title=document.getElementById("titleInput").value.trim()||"Untitled Game";
    var btn=document.getElementById("btnPublish");
    btn.disabled=true; btn.textContent="⏳ Publishing...";
    var game={title:title,publishedAt:Date.now(),blocks:JSON.parse(JSON.stringify(blocks)),triangles:JSON.parse(JSON.stringify(triangles)),wins:JSON.parse(JSON.stringify(wins)),spawnPoint:spawnPoint};
    pushGame(game).then(function(){
      localStorage.setItem("lastPublishTime",Date.now().toString());
      startCooldownUI();
      alert("🎉 Published! Everyone can see it in Explore.");
    }).catch(function(e){
      console.error("Publish failed:",e);
      alert("Publish failed: "+e.message);
      startCooldownUI();
    });
  }

  function shareLink(){
    var title=document.getElementById("titleInput").value||"Untitled Game";
    var data={title:title,blocks:JSON.parse(JSON.stringify(blocks)),triangles:JSON.parse(JSON.stringify(triangles)),wins:JSON.parse(JSON.stringify(wins)),spawnPoint:spawnPoint};
    var encoded=btoa(JSON.stringify(data));
    var url=location.href.split("?")[0]+"?game="+encodeURIComponent(encoded);
    navigator.clipboard.writeText(url).then(function(){alert("Share link copied!");}).catch(function(){prompt("Copy this link:",url);});
  }

  (function checkURLGame(){
    var params=new URLSearchParams(location.search), encoded=params.get("game");
    if(!encoded)return;
    try{
      var data=JSON.parse(atob(decodeURIComponent(encoded)));
      blocks.push.apply(blocks,data.blocks);triangles.push.apply(triangles,data.triangles);wins.push.apply(wins,data.wins);
      spawnPoint=data.spawnPoint||null;
      if(spawnPoint){player.spawnX=spawnPoint.x;player.spawnY=spawnPoint.y;player.x=player.spawnX;player.y=player.spawnY;}
      document.getElementById("titleInput").value=data.title||"";
      startEditor();
    }catch(e){console.error("Invalid game link",e);}
  })();

  function openExplore(){
    home.style.display="none"; editorContainer.style.display="none"; explorePage.style.display="block";
    renderExplore();
  }

  function renderExplore(){
    explorePage.innerHTML="<h2>🌍 Published Games</h2><p>Loading...</p>";
    fetchGames().then(function(games){
      explorePage.innerHTML="<h2>🌍 Published Games</h2>";
      var backBtn=document.createElement("button"); backBtn.textContent="🏠 Back"; backBtn.onclick=goHome;
      explorePage.appendChild(backBtn);
      if(games.length===0){var p=document.createElement("p");p.textContent="No games yet — be the first!";explorePage.appendChild(p);return;}
      games.forEach(function(g){
        var card=document.createElement("div"); card.className="gameCard";
        var date=g.publishedAt?new Date(g.publishedAt).toLocaleString():"";
        card.innerHTML="<h3>"+g.title+"</h3>"+(date?"<small>"+date+"</small><br><br>":"");
        var btn=document.createElement("button"); btn.textContent="▶️ Play";
        btn.onclick=function(){playGame(g);}; card.appendChild(btn); explorePage.appendChild(card);
      });
    }).catch(function(e){
      explorePage.innerHTML="<h2>🌍 Published Games</h2><p style='color:red'>"+e.message+"</p>";
      var backBtn=document.createElement("button"); backBtn.textContent="🏠 Back"; backBtn.onclick=goHome; explorePage.appendChild(backBtn);
    });
  }

  function playGame(g){
    blocks.length=0;triangles.length=0;wins.length=0;
    blocks.push.apply(blocks,JSON.parse(JSON.stringify(g.blocks)));
    triangles.push.apply(triangles,JSON.parse(JSON.stringify(g.triangles)));
    wins.push.apply(wins,JSON.parse(JSON.stringify(g.wins)));
    spawnPoint=g.spawnPoint||null;
    if(spawnPoint){player.spawnX=spawnPoint.x;player.spawnY=spawnPoint.y;player.x=player.spawnX;player.y=player.spawnY;}
    hasWon=false; explorePage.style.display="none"; editorContainer.style.display="block"; startLoop();
  }

})();
</script>
</body>
</html>
